<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Windows 11 Web</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            overflow: hidden;
        }

        #desktop {
            position: fixed;
            inset: 0;
            background: url("assets/wallpaper.jpg") center/cover;
        }

        #taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 52px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 0 10px;
        }

        #login-screen {
            position: fixed;
            inset: 0;
            background: url("assets/wallpaper.jpg") center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
        }

        .login-box {
            width: 340px;
            padding: 25px;
            border-radius: 15px;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(25px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-box input {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .login-box button {
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #user-list {
            margin-top: 10px;
            font-size: 13px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="login-screen">

    <div class="login-box">

        <h2>Windows 11 Web</h2>

        <p>Connexion</p>

        <input id="login-username" placeholder="Nom d'utilisateur">

        <input id="login-password" type="password" placeholder="Mot de passe">

        <button onclick="registerUser()">
            Créer un compte
        </button>

        <button onclick="loginUser()">
            Se connecter
        </button>

        <div id="user-list"></div>

    </div>

</div>

<!-- ================= DESKTOP ================= -->
<div id="desktop" style="display:none;">

    <div id="taskbar">

        <button onclick="logoutUser()">🚪 Déconnexion</button>

    </div>

</div>

<!-- ================= SCRIPTS ================= -->
<script src="js/windowmanager.js"></script>
<script src="js/notifications.js"></script>
<script src="js/users.js"></script>

</body>
</html>
