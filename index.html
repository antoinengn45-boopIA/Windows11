<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Windows 11</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Bureau -->
    <div id="desktop">

        <!-- Icônes -->

        <div class="desktop-icon" ondblclick="openApp('explorer')">
            <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
            <span>Explorateur</span>
        </div>

        <div class="desktop-icon" ondblclick="openApp('notepad')">
            <img src="https://cdn-icons-png.flaticon.com/512/888/888879.png">
            <span>Bloc-notes</span>
        </div>

        <div class="desktop-icon" ondblclick="openApp('paint')">
            <img src="https://cdn-icons-png.flaticon.com/512/1159/1159633.png">
            <span>Paint</span>
        </div>

        <div class="desktop-icon" ondblclick="openApp('calculator')">
            <img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png">
            <span>Calculatrice</span>
        </div>

        <div class="desktop-icon" ondblclick="openApp('settings')">
            <img src="https://cdn-icons-png.flaticon.com/512/2099/2099058.png">
            <span>Paramètres</span>
        </div>

        <div class="desktop-icon" ondblclick="openApp('taskmgr')">
            <img src="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">
            <span>Gestionnaire</span>
        </div>

        <!-- Menu démarrer -->

        <div id="startMenu">

            <input
                type="text"
                id="search"
                placeholder="Rechercher une application...">

            <div class="apps">

                <div class="app" onclick="openApp('explorer')">
                    <div class="app-icon">📁</div>
                    <div class="app-name">Explorateur</div>
                </div>

                <div class="app" onclick="openApp('notepad')">
                    <div class="app-icon">📝</div>
                    <div class="app-name">Bloc-notes</div>
                </div>

                <div class="app" onclick="openApp('paint')">
                    <div class="app-icon">🎨</div>
                    <div class="app-name">Paint</div>
                </div>

                <div class="app" onclick="openApp('calculator')">
                    <div class="app-icon">🧮</div>
                    <div class="app-name">Calculatrice</div>
                </div>

                <div class="app" onclick="openApp('settings')">
                    <div class="app-icon">⚙️</div>
                    <div class="app-name">Paramètres</div>
                </div>

                <div class="app" onclick="openApp('taskmgr')">
                    <div class="app-icon">📊</div>
                    <div class="app-name">Gestionnaire</div>
                </div>

            </div>

        </div>

        <!-- Zone notifications -->

        <div id="notifications"></div>

    </div>

    <!-- Barre des tâches -->

    <div id="taskbar">

        <div
            id="startBtn"
            class="task-icon"
            title="Démarrer">
            ⊞
        </div>

        <div
            class="task-icon"
            onclick="openApp('explorer')">
            📁
        </div>

        <div
            class="task-icon"
            onclick="openApp('notepad')">
            📝
        </div>

        <div
            class="task-icon"
            onclick="openApp('paint')">
            🎨
        </div>

        <div
            class="task-icon"
            onclick="openApp('calculator')">
            🧮
        </div>

        <div
            class="task-icon"
            onclick="openApp('settings')">
            ⚙️
        </div>

        <div
            class="task-icon"
            onclick="openApp('taskmgr')">
            📊
        </div>

        <div id="clock"></div>

    </div>

    <!-- Scripts -->

    <script src="script.js"></script>

    <script src="explorer.js"></script>
    <script src="notepad.js"></script>
    <script src="paint.js"></script>
    <script src="calculator.js"></script>
    <script src="settings.js"></script>
    <script src="taskmgr.js"></script>

</body>
</html>
